<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena — Feature Docs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0f17;
  --surface:#111622;
  --surface2:#1a2133;
  --surface3:#202840;
  --border:#1e2a3d;
  --border2:#2a3a55;
  --text:#dde6f5;--text2:#6b7fa0;--text3:#a0b4d0;
  --blue:#4d9fff;--blue-bg:rgba(77,159,255,.08);--blue-b:rgba(77,159,255,.18);
  --green:#34d67a;--green-bg:rgba(52,214,122,.08);--green-b:rgba(52,214,122,.18);
  --orange:#f0a041;--orange-bg:rgba(240,160,65,.08);--orange-b:rgba(240,160,65,.18);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.08);--purple-b:rgba(167,139,250,.18);
  --red:#f87171;--red-bg:rgba(248,113,113,.08);
  --r:12px;--r2:8px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

/* HEADER */
.hdr{
  background:rgba(11,15,23,.9);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 28px;height:52px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-logo{
  width:28px;height:28px;border-radius:7px;
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#fff;
  flex-shrink:0;
}
.hdr-name{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.hdr-name span{color:var(--text2);font-weight:400}
.hdr-pill{
  font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--green);background:var(--green-bg);
  border:1px solid var(--green-b);padding:3px 10px;border-radius:20px;
}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 52px)}

/* SIDEBAR */
.sidebar{
  width:210px;flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  padding:16px 0 60px;
  position:sticky;top:52px;
  height:calc(100vh - 52px);
  overflow-y:auto;
}
.sb-label{
  padding:16px 16px 5px;
  font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:2px;
  color:var(--text2);
}
.sb-label:first-child{padding-top:4px}
.sb-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 16px;font-size:13px;
  color:var(--text2);cursor:pointer;
  transition:.15s;border-left:2px solid transparent;
}
.sb-item:hover{color:var(--text3);background:var(--surface2)}
.sb-item.on{color:var(--blue);border-left-color:var(--blue);background:var(--blue-bg);font-weight:600}
.sb-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;opacity:.5}
.sb-item.on .sb-dot{opacity:1}
.sb-count{
  margin-left:auto;font-size:10px;font-weight:600;
  background:var(--surface3);color:var(--text2);
  padding:1px 7px;border-radius:10px;
}
.sb-item.on .sb-count{background:var(--blue-bg);color:var(--blue)}
.sb-hr{border:none;border-top:1px solid var(--border);margin:10px 0}

/* MAIN */
.main{flex:1;padding:40px 44px 80px;overflow-x:hidden;max-width:860px}

/* BREADCRUMB */
.bc{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);margin-bottom:18px}
.bc-a{color:var(--blue);cursor:pointer}
.bc-a:hover{text-decoration:underline}
.bc-sep{color:var(--border2)}

/* PAGE HEADER */
.pg-hdr{margin-bottom:26px}
.pg-title{font-size:19px;font-weight:700;color:var(--text);letter-spacing:-.3px;margin-bottom:4px}
.pg-sub{font-size:13px;color:var(--text2)}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:24px}
.search-wrap input{
  width:100%;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r2);
  padding:9px 14px 9px 38px;
  font-size:13px;color:var(--text);
  outline:none;transition:.15s;
}
.search-wrap input:focus{border-color:var(--blue-b);background:var(--surface2)}
.search-wrap input::placeholder{color:var(--text2)}
.s-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:13px;pointer-events:none}

/* YEAR DIVIDER */
.yr-div{
  font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:1.8px;
  color:var(--text2);
  display:flex;align-items:center;gap:10px;
  margin-bottom:12px;
}
.yr-div::after{content:'';flex:1;height:1px;background:var(--border)}

/* QUARTER GRID */
.qgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px;margin-bottom:32px}
.qcard{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:18px 16px 16px;
  cursor:pointer;transition:.2s;
  position:relative;overflow:hidden;
}
.qcard:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-3px)}
.qcard-stripe{
  position:absolute;top:0;left:0;right:0;height:3px;
  transition:.2s;opacity:.6;
}
.qcard:hover .qcard-stripe{opacity:1}
.qcard.q1 .qcard-stripe{background:linear-gradient(90deg,#34d67a,#22c55e)}
.qcard.q2 .qcard-stripe{background:linear-gradient(90deg,#4d9fff,#818cf8)}
.qcard.q3 .qcard-stripe{background:linear-gradient(90deg,#f0a041,#fb923c)}
.qcard.q4 .qcard-stripe{background:linear-gradient(90deg,#a78bfa,#ec4899)}
.qcard-yr{
  position:absolute;top:14px;right:12px;
  font-size:9px;font-weight:700;letter-spacing:.5px;
  color:var(--text2);background:var(--surface3);
  padding:2px 7px;border-radius:10px;
}
.qcard-tag{
  font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  margin-bottom:10px;padding-top:4px;
}
.qcard.q1 .qcard-tag{color:var(--green)}
.qcard.q2 .qcard-tag{color:var(--blue)}
.qcard.q3 .qcard-tag{color:var(--orange)}
.qcard.q4 .qcard-tag{color:var(--purple)}
.qcard-n{font-size:28px;font-weight:800;color:var(--text);line-height:1;margin-bottom:2px}
.qcard-lbl{font-size:11px;color:var(--text2)}

/* TASK LIST */
.task-list{display:flex;flex-direction:column;gap:6px}
.task{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:14px 16px;
  cursor:pointer;transition:.18s;
  display:flex;align-items:center;gap:14px;
  position:relative;overflow:hidden;
}
.task-bar{
  position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--blue);
  transform:scaleY(0);transition:.18s;
  transform-origin:center;border-radius:3px 0 0 3px;
}
.task:hover{border-color:var(--border2);background:var(--surface2)}
.task:hover .task-bar{transform:scaleY(1)}
.task-ic{
  width:38px;height:38px;border-radius:9px;
  background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;transition:.18s;
}
.task:hover .task-ic{background:var(--surface3);border-color:var(--border2)}
.task-body{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.task-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.task-path{
  font-size:11px;color:var(--text2);
  font-family:'SFMono-Regular',Consolas,monospace;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  max-width:340px;
}
.task-qb{
  font-size:10px;font-weight:700;padding:1px 8px;border-radius:10px;flex-shrink:0;
}
.task-qb.q1{background:var(--green-bg);color:var(--green)}
.task-qb.q2{background:var(--blue-bg);color:var(--blue)}
.task-qb.q3{background:var(--orange-bg);color:var(--orange)}
.task-qb.q4{background:var(--purple-bg);color:var(--purple)}
.task-tags{display:flex;gap:4px;margin-top:6px}
.tag{font-size:10px;font-weight:600;padding:1px 8px;border-radius:10px}
.tag.spec{background:var(--blue-bg);border:1px solid var(--blue-b);color:var(--blue)}
.tag.ux{background:var(--purple-bg);border:1px solid var(--purple-b);color:var(--purple)}
.tag.dev{background:var(--green-bg);border:1px solid var(--green-b);color:var(--green)}
.tag.qa{background:var(--orange-bg);border:1px solid var(--orange-b);color:var(--orange)}
.task-arrow{color:var(--text2);font-size:18px;transition:.18s;flex-shrink:0;opacity:.3}
.task:hover .task-arrow{color:var(--blue);opacity:1;transform:translateX(3px)}

/* EMPTY */
.empty{text-align:center;padding:64px 20px;color:var(--text2)}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.3}
.empty p{font-size:13px}

/* SPINNER */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

@media(max-width:768px){
  .sidebar{display:none}
  .main{padding:20px 18px 60px}
  .qgrid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">A</div>
    <span class="hdr-name">Arena <span>/ Feature Docs</span></span>
  </div>
  <span class="hdr-pill">Spec Portal</span>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="sb-label">Menu</div>
    <div class="sb-item on" id="sb-home" onclick="goHome()">
      <span class="sb-dot"></span>
      Tất cả
    </div>
    <hr class="sb-hr">
    <div id="sb-tree"></div>
  </nav>
  <main class="main" id="main">
    <div style="display:flex;align-items:center;gap:10px;color:var(--text2);padding:40px 0;font-size:13px">
      <div class="spin"></div>Đang tải...
    </div>
  </main>
</div>

<script>
let DATA={}, state={year:null,q:null,search:""};
const QC={Q1:"q1",Q2:"q2",Q3:"q3",Q4:"q4"};
const qc=q=>QC[q]||"q2";
const esc=s=>String(s).replace(/"/g,"&quot;");
function tIcon(t=[]){return t.includes("ux")?"🎨":t.includes("dev")?"⚙️":t.includes("qa")?"🧪":"📄"}

function sidebar(){
  let h="";
  for(const yr of Object.keys(DATA).sort().reverse()){
    h+=`<div class="sb-label">${yr}</div>`;
    for(const q of Object.keys(DATA[yr]).sort()){
      const n=DATA[yr][q].length, on=state.year===yr&&state.q===q;
      h+=`<div class="sb-item${on?" on":""}" onclick="selectQ('${yr}','${q}')">
        <span class="sb-dot"></span>
        <span style="flex:1">${q}</span>
        <span class="sb-count">${n}</span>
      </div>`;
    }
  }
  document.getElementById("sb-tree").innerHTML=h;
  document.getElementById("sb-home").className="sb-item"+((!state.year&&!state.q)?" on":"");
}

function render(){
  sidebar();
  const el=document.getElementById("main");

  if(!state.year&&!state.q){
    const years=Object.keys(DATA).sort().reverse();
    const all=years.flatMap(yr=>Object.entries(DATA[yr]).flatMap(([q,ts])=>ts.map(t=>({...t,yr,q}))));
    const s=state.search.trim().toLowerCase();
    const found=s?all.filter(t=>t.name.toLowerCase().includes(s)):null;

    let h=`
      <div class="pg-hdr">
        <div class="pg-title">Feature Documents</div>
        <div class="pg-sub">Spec & tài liệu kỹ thuật dự án Arena</div>
      </div>
      <div class="search-wrap">
        <span class="s-ico">⌕</span>
        <input type="text" placeholder="Tìm kiếm spec..." value="${esc(state.search)}"
          oninput="state.search=this.value;render()">
      </div>`;

    if(found){
      h+=`<div style="font-size:13px;color:var(--text2);margin-bottom:16px">
        <b style="color:var(--text)">${found.length}</b> kết quả cho "<em>${esc(s)}</em>"
      </div>${taskList(found,true)}`;
    } else {
      for(const yr of years){
        h+=`<div class="yr-div">${yr}</div><div class="qgrid">`;
        for(const q of Object.keys(DATA[yr]).sort()){
          const n=DATA[yr][q].length;
          h+=`<div class="qcard ${qc(q)}" onclick="selectQ('${yr}','${q}')">
            <div class="qcard-stripe"></div>
            <div class="qcard-yr">${yr}</div>
            <div class="qcard-tag">${q}</div>
            <div class="qcard-n">${n}</div>
            <div class="qcard-lbl">spec file${n!==1?"s":""}</div>
          </div>`;
        }
        h+=`</div>`;
      }
    }
    el.innerHTML=h;

  } else if(state.year&&state.q){
    const ts=DATA[state.year][state.q]||[];
    const s=state.search.trim().toLowerCase();
    const found=s?ts.filter(t=>t.name.toLowerCase().includes(s)):ts;

    el.innerHTML=`
      ${makeBc([{l:"Home",f:"goHome()"},{l:state.year,f:`selectYear('${state.year}')`}],state.q)}
      <div class="pg-hdr">
        <div class="pg-title">${state.year} · ${state.q}</div>
        <div class="pg-sub">${ts.length} spec document${ts.length!==1?"s":""}</div>
      </div>
      <div class="search-wrap">
        <span class="s-ico">⌕</span>
        <input type="text" placeholder="Lọc trong ${state.q}..." value="${esc(state.search)}"
          oninput="state.search=this.value;render()">
      </div>
      ${found.length?taskList(found):`<div class="empty"><div class="empty-icon">📭</div><p>Không có kết quả</p></div>`}`;
  }
}

function taskList(ts,showQ=false){
  if(!ts.length) return `<div class="empty"><div class="empty-icon">📭</div><p>Chưa có spec nào</p></div>`;
  return `<div class="task-list">${ts.map(t=>`
    <div class="task" onclick="window.open('${t.file}','_self')">
      <div class="task-bar"></div>
      <div class="task-ic">${tIcon(t.tags||[])}</div>
      <div class="task-body">
        <div class="task-name">${t.name}</div>
        <div class="task-meta">
          ${showQ?`<span class="task-qb ${qc(t.q)}">${t.yr} · ${t.q}</span>`:""}
          <span class="task-path">${t.file}</span>
        </div>
        ${(t.tags||[]).length?`<div class="task-tags">${t.tags.map(g=>`<span class="tag ${g}">${g}</span>`).join("")}</div>`:""}
      </div>
      <div class="task-arrow">›</div>
    </div>`).join("")}</div>`;
}

function makeBc(cs,cur){
  let h=`<div class="bc">`;
  cs.forEach(c=>{h+=`<span class="bc-a" onclick="${c.f}">${c.l}</span><span class="bc-sep">/</span>`;});
  return h+`<span style="color:var(--text3)">${cur}</span></div>`;
}

function goHome()      {state={year:null,q:null,search:""};render()}
function selectYear(y) {state={year:y,q:null,search:""};render()}
function selectQ(y,q)  {state={year:y,q,search:""};render()}

fetch("manifest.json")
  .then(r=>r.json())
  .then(j=>{DATA=j;render()})
  .catch(()=>{
    document.getElementById("main").innerHTML=`
      <div style="background:var(--red-bg);border:1px solid rgba(248,113,113,.2);border-radius:10px;padding:16px 20px;color:var(--red);font-size:13px;margin-top:10px;line-height:1.8">
        ⚠️ Không tải được <code style="font-family:monospace;background:rgba(248,113,113,.1);padding:1px 6px;border-radius:4px">manifest.json</code><br>
        <span style="color:var(--text2)">Kiểm tra file có cùng thư mục với index.html.</span>
      </div>`;
  });
</script>
<!-- Chỉ sửa manifest.json để thêm spec mới. Không đụng file này. -->
</body>
</html>
