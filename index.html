<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena — Feature Docs</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #0e0e12;
  --ink2: #2a2a35;
  --muted: #6b6b7e;
  --line: #e4e4ef;
  --bg: #f6f6f9;
  --surface: #ffffff;
  --accent: #3d3bff;
  --accent2: #ff3b7a;
  --green: #00b87a;
  --tag-spec: #ede9ff;
  --tag-spec-t: #4f39c4;
  --tag-ux: #ffe9f0;
  --tag-ux-t: #c4396b;
  --tag-dev: #e0faf1;
  --tag-dev-t: #1a7a55;
  --tag-qa: #fff4e0;
  --tag-qa-t: #9a5c00;
}

body {
  font-family: 'Instrument Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* HEADER */
.hdr {
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  padding: 0 32px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.hdr-brand { display: flex; align-items: center; gap: 12px; }
.hdr-logo {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 800;
  color: #fff;
}
.hdr-name {
  font-family: 'Syne', sans-serif;
  font-size: 14px; font-weight: 700;
  color: var(--ink); letter-spacing: -.2px;
}
.hdr-name span { color: var(--muted); font-weight: 400; }
.hdr-badge {
  font-family: 'DM Mono', monospace;
  font-size: 10px; font-weight: 500;
  letter-spacing: .5px;
  color: var(--green);
  background: #e0faf1;
  border: 1px solid #b3f0db;
  padding: 3px 10px; border-radius: 4px;
  text-transform: uppercase;
}

/* LAYOUT */
.layout { display: flex; min-height: calc(100vh - 52px); }

/* SIDEBAR */
.sidebar {
  width: 200px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--line);
  padding: 16px 0 60px;
  position: sticky; top: 52px;
  height: calc(100vh - 52px);
  overflow-y: auto;
}

.sb-link {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px;
  font-size: 13px; color: var(--muted);
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all .12s; font-weight: 500;
  user-select: none;
}
.sb-link:hover { color: var(--ink2); background: var(--bg); }
.sb-link.active { color: var(--accent); border-left-color: var(--accent); background: #f0f0ff; font-weight: 600; }
.sb-link .sb-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--line); flex-shrink: 0; }
.sb-link.active .sb-dot { background: var(--accent); }
.sb-link-count { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }

.sb-divider { height: 1px; background: var(--line); margin: 8px 12px; }

.sb-year-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px 4px; cursor: pointer;
}
.sb-year-hdr:hover { background: var(--bg); }
.sb-year-label { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; color: var(--ink2); }
.sb-chevron { font-size: 10px; color: var(--muted); transition: transform .2s; }
.sb-chevron.open { transform: rotate(180deg); }

.sb-qs { display: flex; flex-direction: column; overflow: hidden; transition: max-height .25s ease; }
.sb-q {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 16px 6px 28px;
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--muted); cursor: pointer;
  transition: all .12s; border-left: 2px solid transparent;
}
.sb-q:hover { color: var(--ink2); background: var(--bg); }
.sb-q.active { color: var(--accent); background: #f0f0ff; border-left-color: var(--accent); font-weight: 500; }
.sb-q.empty { opacity: .3; pointer-events: none; }
.sb-q-count { margin-left: auto; font-size: 9px; }

/* MAIN */
.main { flex: 1; padding: 32px 40px 80px; max-width: 900px; }

/* BREADCRUMB */
.bc {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--muted);
  margin-bottom: 24px;
  font-family: 'DM Mono', monospace;
}
.bc-a { color: var(--accent); cursor: pointer; }
.bc-a:hover { text-decoration: underline; }
.bc-sep { color: var(--line); }

/* HERO */
.home-hero {
  background: var(--ink);
  border-radius: 12px; padding: 28px 32px;
  margin-bottom: 28px;
  position: relative; overflow: hidden;
}
.home-hero::before {
  content: ''; position: absolute;
  top: -40px; right: -40px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(61,59,255,.35) 0%, transparent 70%);
  pointer-events: none;
}
.home-hero::after {
  content: ''; position: absolute;
  bottom: -30px; left: 40%;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(255,59,122,.2) 0%, transparent 70%);
  pointer-events: none;
}
.home-hero-label {
  font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500;
  letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,.4); margin-bottom: 8px;
}
.home-hero-title {
  font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800;
  color: #fff; letter-spacing: -.5px; margin-bottom: 6px; line-height: 1.2;
}
.home-hero-sub { font-size: 13px; color: rgba(255,255,255,.5); }
.home-hero-stats { display: flex; gap: 20px; margin-top: 20px; }
.hero-stat {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 8px; padding: 10px 16px;
}
.hero-stat-n { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: #fff; line-height: 1; }
.hero-stat-l { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 2px; }

/* SEARCH */
.search-wrap { position: relative; margin-bottom: 24px; }
.search-wrap input {
  width: 100%;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 8px; padding: 10px 14px 10px 38px;
  font-size: 13px; color: var(--ink); outline: none;
  font-family: 'Instrument Sans', sans-serif;
  transition: border-color .15s, box-shadow .15s;
}
.search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(61,59,255,.08); }
.search-wrap input::placeholder { color: var(--muted); }
.search-ico { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }

/* YEAR GRID */
.yr-block { margin-bottom: 32px; }
.yr-block-hdr { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
.yr-block-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800; color: var(--ink); text-transform: uppercase; letter-spacing: 1px; }
.yr-block-line { flex: 1; height: 1px; background: var(--line); }
.yr-block-count { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

.q-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.q-card {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 10px; padding: 14px;
  cursor: pointer; transition: all .15s;
  position: relative; overflow: hidden;
}
.q-card:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(61,59,255,.1); transform: translateY(-2px); }
.q-card.empty { opacity: .3; pointer-events: none; }
.q-card-accent {
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  opacity: 0; transition: opacity .15s;
}
.q-card:hover .q-card-accent { opacity: 1; }
.q-card-label { font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.q-card-n { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--ink); line-height: 1; letter-spacing: -1px; }
.q-card-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* SECTION HEADER */
.sec-hdr {
  font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500;
  letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
  margin-bottom: 10px; display: flex; align-items: center; gap: 10px;
}
.sec-hdr::after { content: ''; flex: 1; height: 1px; background: var(--line); }

/* TASK CARDS */
.task-list { display: flex; flex-direction: column; gap: 6px; }
.task {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 10px; padding: 14px 16px;
  cursor: pointer; transition: all .15s;
  display: flex; align-items: center; gap: 14px;
}
.task:hover { border-color: rgba(61,59,255,.3); box-shadow: 0 4px 16px rgba(61,59,255,.06); transform: translateX(2px); }
.task-icon {
  width: 38px; height: 38px; border-radius: 8px;
  background: var(--bg); border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.task-body { flex: 1; min-width: 0; }
.task-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 5px; }
.task-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.task-qb {
  font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500;
  padding: 2px 8px; border-radius: 4px;
  background: var(--bg); color: var(--muted); border: 1px solid var(--line); flex-shrink: 0;
}
.task-path { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 300px; }
.task-tags { display: flex; gap: 4px; margin-top: 5px; }
.tag { font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500; padding: 2px 8px; border-radius: 3px; }
.tag.spec { background: var(--tag-spec); color: var(--tag-spec-t); }
.tag.ux   { background: var(--tag-ux);   color: var(--tag-ux-t); }
.tag.dev  { background: var(--tag-dev);  color: var(--tag-dev-t); }
.tag.qa   { background: var(--tag-qa);   color: var(--tag-qa-t); }
.task-arrow { font-size: 18px; color: var(--line); flex-shrink: 0; transition: all .15s; }
.task:hover .task-arrow { color: var(--accent); transform: translateX(2px); }

/* Q VIEW HEADER */
.q-view-hdr {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 12px; padding: 20px 24px;
  margin-bottom: 20px; display: flex; align-items: center; gap: 20px;
}
.q-view-badge { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; color: var(--accent); line-height: 1; }
.q-view-info-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.q-view-info-val { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--ink); }

.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state-icon { font-size: 28px; opacity: .4; margin-bottom: 10px; }
.empty-state p { font-size: 13px; }

.spin {
  width: 14px; height: 14px;
  border: 2px solid var(--line); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

.search-result-hdr { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
.search-result-hdr b { color: var(--ink); }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { padding: 20px 18px 60px; max-width: 100%; }
  .q-grid { grid-template-columns: repeat(2, 1fr); }
  .home-hero-stats { flex-wrap: wrap; gap: 10px; }
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">A</div>
    <span class="hdr-name">Arena <span>/ Feature Docs</span></span>
  </div>
  <span class="hdr-badge">Spec Portal</span>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main">
    <div style="display:flex;align-items:center;gap:10px;color:var(--muted);padding:40px 0;font-size:13px">
      <div class="spin"></div> Đang tải...
    </div>
  </main>
</div>

<script>
const QS = ['Q1','Q2','Q3','Q4','Q5','Q6','Q7','Q8','Q9','Q10','Q11','Q12'];
let DATA = {}, state = { year: null, q: null, search: '' };
const collapsed = {};

function initData(raw) {
  for (const yr of Object.keys(raw)) {
    DATA[yr] = {};
    for (const q of QS) DATA[yr][q] = [];
    const yrData = raw[yr];
    if (Array.isArray(yrData)) {
      for (const item of yrData) {
        const q = item.q || 'Q1';
        if (!DATA[yr][q]) DATA[yr][q] = [];
        DATA[yr][q].push(item);
      }
    } else if (typeof yrData === 'object') {
      for (const q of Object.keys(yrData)) {
        DATA[yr][q] = Array.isArray(yrData[q]) ? yrData[q] : [];
      }
    }
  }
}

function totalAll() {
  return Object.keys(DATA).flatMap(yr => QS.map(q => (DATA[yr][q]||[]).length)).reduce((a,b)=>a+b,0);
}
function totalYr(yr) { return QS.reduce((a,q) => a + (DATA[yr][q]||[]).length, 0); }
function activeQs() {
  return Object.keys(DATA).flatMap(yr => QS.map(q => (DATA[yr][q]||[]).length)).filter(n=>n>0).length;
}
function tIcon(tags=[]) {
  if (tags.includes('ux'))  return '🎨';
  if (tags.includes('dev')) return '⚙️';
  if (tags.includes('qa'))  return '🧪';
  return '📄';
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderSB() {
  const years = Object.keys(DATA).sort().reverse();
  let h = `<div class="sb-link ${!state.year?'active':''}" onclick="goHome()">
    <span class="sb-dot"></span>
    <span>Tất cả</span>
    <span class="sb-link-count">${totalAll()}</span>
  </div>
  <div class="sb-divider"></div>`;

  for (const yr of years) {
    const open = !collapsed[yr];
    const activeQsList = QS.filter(q => (DATA[yr][q]||[]).length > 0);
    if (!activeQsList.length) continue;
    h += `<div class="sb-year-hdr" onclick="toggleYr('${yr}')">
      <span class="sb-year-label">${yr}</span>
      <span class="sb-chevron ${open?'open':''}">▾</span>
    </div>
    <div class="sb-qs" id="sbqs-${yr}" style="max-height:${open?'400px':'0'}">`;
    for (const q of QS) {
      const n = (DATA[yr][q]||[]).length;
      if (!n) continue;
      const on = state.year===yr && state.q===q;
      h += `<div class="sb-q ${on?'active':''}" onclick="selectQ('${yr}','${q}')">
        ${q}
        <span class="sb-q-count">${n}</span>
      </div>`;
    }
    h += `</div>`;
  }
  document.getElementById('sidebar').innerHTML = h;
}

function render() {
  renderSB();
  const el = document.getElementById('main');
  if (!state.year) renderHome(el);
  else renderQ(el);
}

function renderHome(el) {
  const years = Object.keys(DATA).sort().reverse();
  const all = years.flatMap(yr => QS.flatMap(q => (DATA[yr][q]||[]).map(t=>({...t,yr,q}))));
  const s = state.search.trim().toLowerCase();
  const found = s ? all.filter(t => t.name.toLowerCase().includes(s)) : null;

  let h = '';
  if (!s) {
    h += `<div class="home-hero">
      <div class="home-hero-label">Arena — Spec Portal</div>
      <div class="home-hero-title">Feature Documents</div>
      <div class="home-hero-sub">Tài liệu spec & kỹ thuật dự án Arena</div>
      <div class="home-hero-stats">
        <div class="hero-stat">
          <div class="hero-stat-n">${totalAll()}</div>
          <div class="hero-stat-l">Tổng spec</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-n">${years.length}</div>
          <div class="hero-stat-l">Năm</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-n">${activeQs()}</div>
          <div class="hero-stat-l">Quarter có data</div>
        </div>
      </div>
    </div>`;
  }

  h += `<div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input type="text" placeholder="Tìm kiếm spec..." value="${esc(state.search)}"
      oninput="state.search=this.value;render()">
  </div>`;

  if (found) {
    h += `<div class="search-result-hdr"><b>${found.length}</b> kết quả cho "<em>${esc(state.search.trim())}</em>"</div>`;
    h += taskList(found, true);
  } else {
    for (const yr of years) {
      const tot = totalYr(yr);
      const activeQsList = QS.filter(q => (DATA[yr][q]||[]).length > 0);
      if (!activeQsList.length) continue;
      h += `<div class="yr-block">
        <div class="yr-block-hdr">
          <span class="yr-block-title">${yr}</span>
          <span class="yr-block-line"></span>
          <span class="yr-block-count">${tot} spec</span>
        </div>
        <div class="q-grid">`;
      for (const q of QS) {
        const n = (DATA[yr][q]||[]).length;
        if (!n) continue;
        h += `<div class="q-card" onclick="selectQ('${yr}','${q}')">
          <div class="q-card-accent"></div>
          <div class="q-card-label">${q}</div>
          <div class="q-card-n">${n}</div>
          <div class="q-card-sub">spec${n!==1?'s':''}</div>
        </div>`;
      }
      h += `</div></div>`;
    }
  }
  el.innerHTML = h;
}

function renderQ(el) {
  const items = (DATA[state.year] && DATA[state.year][state.q]) || [];
  const s = state.search.trim().toLowerCase();
  const found = s ? items.filter(t => t.name.toLowerCase().includes(s)) : items;

  let h = `<div class="bc">
    <span class="bc-a" onclick="goHome()">Home</span>
    <span class="bc-sep">/</span>
    <span class="bc-a" onclick="goHome()">${state.year}</span>
    <span class="bc-sep">/</span>
    <span>${state.q}</span>
  </div>
  <div class="q-view-hdr">
    <div class="q-view-badge">${state.q}</div>
    <div>
      <div class="q-view-info-label">${state.year}</div>
      <div class="q-view-info-val">${items.length} spec document${items.length!==1?'s':''}</div>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-ico">🔍</span>
    <input type="text" placeholder="Lọc trong ${state.q}..." value="${esc(state.search)}"
      oninput="state.search=this.value;render()">
  </div>`;

  if (!s) h += `<div class="sec-hdr">Spec Documents</div>`;
  h += found.length ? taskList(found) : `<div class="empty-state"><div class="empty-state-icon">📭</div><p>Không có kết quả</p></div>`;
  el.innerHTML = h;
}

function taskList(ts, showQ=false) {
  if (!ts.length) return `<div class="empty-state"><div class="empty-state-icon">📭</div><p>Chưa có spec nào</p></div>`;
  return `<div class="task-list">${ts.map(t=>`
    <div class="task" onclick="window.open('${t.file}','_self')">
      <div class="task-icon">${tIcon(t.tags||[])}</div>
      <div class="task-body">
        <div class="task-name">${t.name}</div>
        <div class="task-meta">
          ${showQ?`<span class="task-qb">${t.yr} · ${t.q}</span>`:''}
          <span class="task-path">${t.file}</span>
        </div>
        ${(t.tags||[]).length?`<div class="task-tags">${t.tags.map(g=>`<span class="tag ${g}">${g}</span>`).join('')}</div>`:''}
      </div>
      <div class="task-arrow">›</div>
    </div>`).join('')}</div>`;
}

function goHome()      { state={year:null,q:null,search:''}; render(); }
function selectQ(yr,q) { state={year:yr,q,search:''}; render(); }
function toggleYr(yr) {
  collapsed[yr] = !collapsed[yr];
  const el = document.getElementById('sbqs-'+yr);
  if (el) el.style.maxHeight = collapsed[yr] ? '0' : '400px';
  renderSB();
}

// Load from manifest.json (same directory)
fetch('manifest.json')
  .then(r => r.json())
  .then(raw => { initData(raw); render(); })
  .catch(() => {
    document.getElementById('main').innerHTML = `
      <div style="background:#fef2f2;border:1px solid rgba(220,38,38,.15);border-radius:10px;padding:16px 20px;color:#dc2626;font-size:13px;margin-top:10px;line-height:1.8">
        ⚠️ Không tải được <code style="font-family:'DM Mono',monospace;font-size:12px;background:rgba(220,38,38,.08);padding:1px 6px;border-radius:4px">manifest.json</code><br>
        <span style="color:#6b6b7e">Kiểm tra file có cùng thư mục với index.html.</span>
      </div>`;
  });
</script>
</body>
</html>
