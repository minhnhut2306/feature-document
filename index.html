<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena — Feature Docs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f8fa;--surface:#ffffff;--surface2:#f0f2f5;--border:#e4e7ec;--border2:#cbd2da;
  --text:#111827;--text2:#6b7280;--text3:#374151;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-b:#bfdbfe;
  --green:#16a34a;--green-bg:#f0fdf4;--green-b:#bbf7d0;
  --orange:#d97706;--orange-bg:#fffbeb;--orange-b:#fde68a;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-b:#ddd6fe;
  --red:#dc2626;--red-bg:#fef2f2;
  --r:10px;--r2:7px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:14px}

.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.hdr-name{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.2px}
.hdr-name span{color:var(--text2);font-weight:400}
.hdr-pill{font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--green);background:var(--green-bg);border:1px solid var(--green-b);padding:4px 12px;border-radius:20px}

.layout{display:flex;min-height:calc(100vh - 56px)}

.sidebar{width:224px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:8px 0 60px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}

.sb-all{display:flex;align-items:center;gap:8px;padding:8px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-left:2px solid transparent;font-weight:500;transition:.12s}
.sb-all:hover{background:var(--surface2);color:var(--text3)}
.sb-all.on{color:var(--blue);border-left-color:var(--blue);background:var(--blue-bg);font-weight:600}
.sb-all-dot{width:4px;height:4px;border-radius:50%;background:currentColor;opacity:.4;flex-shrink:0}
.sb-all.on .sb-all-dot{opacity:1}
.sb-all-count{margin-left:auto;font-size:11px;font-weight:600;background:var(--surface2);color:var(--text2);padding:1px 7px;border-radius:20px;border:1px solid var(--border)}
.sb-all.on .sb-all-count{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-b)}

.sb-hr{border:none;border-top:1px solid var(--border);margin:6px 10px}

.sb-yr-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px;cursor:pointer;user-select:none;transition:.12s}
.sb-yr-hdr:hover{background:var(--surface2)}
.sb-yr-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.8px;color:var(--text2)}
.sb-yr-meta{display:flex;align-items:center;gap:6px}
.sb-yr-count{font-size:10px;font-weight:600;background:var(--surface2);color:var(--text2);padding:1px 7px;border-radius:20px;border:1px solid var(--border)}
.sb-chevron{font-size:10px;color:var(--text2);transition:transform .2s;display:inline-block;line-height:1}
.sb-chevron.open{transform:rotate(180deg)}

.sb-qs{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;padding:4px 10px 10px;overflow:hidden;transition:max-height .25s ease}
.sb-qs.hidden{max-height:0!important;padding:0 10px}
.sb-q{padding:5px 2px;border-radius:6px;font-size:10px;font-weight:600;color:var(--text2);cursor:pointer;text-align:center;border:1px solid transparent;transition:.12s;background:var(--surface2)}
.sb-q:hover{border-color:var(--border);color:var(--text3)}
.sb-q.on{background:var(--blue-bg);border-color:var(--blue-b);color:var(--blue)}
.sb-q.empty{opacity:.3;cursor:default;pointer-events:none}

.main{flex:1;padding:36px 48px 80px;max-width:960px}

.bc{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);margin-bottom:20px}
.bc-a{color:var(--blue);cursor:pointer;font-weight:500}
.bc-a:hover{text-decoration:underline}
.bc-sep{color:var(--border2)}

.pg-hdr{margin-bottom:22px}
.pg-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.4px;margin-bottom:4px;line-height:1.3}
.pg-sub{font-size:13px;color:var(--text2)}

.search-wrap{position:relative;margin-bottom:24px}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:10px 14px 10px 40px;font-size:13.5px;color:var(--text);outline:none;transition:.15s;font-family:'Inter',sans-serif}
.search-wrap input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.search-wrap input::placeholder{color:var(--text2)}
.s-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:15px;pointer-events:none}

.stats-row{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 18px}
.stat-n{font-size:18px;font-weight:700;line-height:1}
.stat-l{font-size:11px;color:var(--text2);margin-top:2px}

.yr-section{margin-bottom:32px}
.yr-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.yr-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text2);display:flex;align-items:center;gap:10px}
.yr-label::after{content:'';width:40px;height:1px;background:var(--border)}
.yr-total{font-size:11px;color:var(--text2)}

.qgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
.qcard{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 10px 9px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.qcard:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.06)}
.qcard.empty{opacity:.35;cursor:default;pointer-events:none}
.qcard-stripe{position:absolute;top:0;left:0;right:0;height:2px;background:var(--blue)}
.qcard-label{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:5px}
.qcard-n{font-size:20px;font-weight:700;color:var(--text);line-height:1;letter-spacing:-.5px}
.qcard-sub{font-size:10px;color:var(--text2);margin-top:2px}

.task-list{display:flex;flex-direction:column;gap:7px}
.task{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:14px}
.task:hover{border-color:var(--border2);box-shadow:0 2px 10px rgba(0,0,0,.05);transform:translateY(-1px)}
.task-ic{width:40px;height:40px;border-radius:9px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.task-body{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.task-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.task-path{font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:380px}
.task-qb{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;flex-shrink:0;border:1px solid;background:var(--blue-bg);color:var(--blue);border-color:var(--blue-b)}
.task-tags{display:flex;gap:5px;margin-top:6px}
.tag{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;border:1px solid}
.tag.spec{background:var(--blue-bg);border-color:var(--blue-b);color:var(--blue)}
.tag.ux{background:var(--purple-bg);border-color:var(--purple-b);color:var(--purple)}
.tag.dev{background:var(--green-bg);border-color:var(--green-b);color:var(--green)}
.tag.qa{background:var(--orange-bg);border-color:var(--orange-b);color:var(--orange)}
.task-arrow{color:var(--border2);font-size:20px;transition:.15s;flex-shrink:0}
.task:hover .task-arrow{color:var(--blue);transform:translateX(2px)}

.empty{text-align:center;padding:64px 20px;color:var(--text2)}
.empty-icon{font-size:28px;margin-bottom:10px;opacity:.4}
.empty p{font-size:13px}

@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

@media(max-width:768px){
  .sidebar{display:none}
  .main{padding:20px 18px 60px;max-width:100%}
  .qgrid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">A</div>
    <span class="hdr-name">Arena <span>/ Feature Docs</span></span>
  </div>
  <span class="hdr-pill">Spec Portal</span>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main">
    <div style="display:flex;align-items:center;gap:10px;color:var(--text2);padding:40px 0;font-size:13px">
      <div class="spin"></div>Đang tải...
    </div>
  </main>
</div>

<script>
const QS=['Q1','Q2','Q3','Q4','Q5','Q6','Q7','Q8','Q9','Q10','Q11','Q12'];
let DATA={}, state={year:null,q:null,search:''};
const collapsed={};

function esc(s){return String(s).replace(/"/g,'&quot;')}
function tIcon(t=[]){return t.includes('ux')?'🎨':t.includes('dev')?'⚙️':t.includes('qa')?'🧪':'📄'}

function totalAll(){
  let n=0;
  for(const yr of Object.keys(DATA))
    for(const q of QS) n+=(DATA[yr][q]||[]).length;
  return n;
}
function totalYr(yr){
  return QS.reduce((a,q)=>a+(DATA[yr][q]||[]).length,0);
}
function activeQs(){
  let n=0;
  for(const yr of Object.keys(DATA))
    for(const q of QS) if((DATA[yr][q]||[]).length>0) n++;
  return n;
}

function renderSB(){
  const years=Object.keys(DATA).sort().reverse();
  let h=`<div class="sb-all ${!state.year?'on':''}" onclick="goHome()">
    <span class="sb-all-dot"></span>
    <span style="flex:1">Tất cả</span>
    <span class="sb-all-count">${totalAll()}</span>
  </div>
  <div class="sb-hr" style="margin-top:6px"></div>`;

  for(const yr of years){
    const open=!collapsed[yr];
    const tot=totalYr(yr);
    h+=`<div class="sb-yr-hdr" onclick="toggleYr('${yr}')">
      <span class="sb-yr-label">${yr}</span>
      <div class="sb-yr-meta">
        <span class="sb-yr-count">${tot}</span>
        <span class="sb-chevron ${open?'open':''}">▾</span>
      </div>
    </div>
    <div class="sb-qs ${open?'':'hidden'}" id="qs-${yr}" style="max-height:${open?'120px':'0'}">`;
    for(const q of QS){
      const n=(DATA[yr][q]||[]).length;
      const on=state.year===yr&&state.q===q;
      h+=`<div class="sb-q ${n===0?'empty':''} ${on?'on':''}" onclick="selectQ('${yr}','${q}')">${q}</div>`;
    }
    h+=`</div><div class="sb-hr"></div>`;
  }
  document.getElementById('sidebar').innerHTML=h;
}

function render(){
  renderSB();
  const el=document.getElementById('main');

  if(!state.year){
    const years=Object.keys(DATA).sort().reverse();
    const all=years.flatMap(yr=>
      QS.flatMap(q=>(DATA[yr][q]||[]).map(t=>({...t,yr,q})))
    );
    const s=state.search.trim().toLowerCase();
    const found=s?all.filter(t=>t.name.toLowerCase().includes(s)):null;

    let h=`<div class="pg-hdr">
      <div class="pg-title">Feature Documents</div>
      <div class="pg-sub">Spec & tài liệu kỹ thuật dự án Arena</div>
    </div>`;

    if(!s){
      h+=`<div class="stats-row">
        <div class="stat-chip"><div class="stat-n">${totalAll()}</div><div class="stat-l">Tổng spec</div></div>
        <div class="stat-chip"><div class="stat-n">${years.length}</div><div class="stat-l">Năm</div></div>
        <div class="stat-chip"><div class="stat-n">${activeQs()}</div><div class="stat-l">Quarter có data</div></div>
      </div>`;
    }

    h+=`<div class="search-wrap">
      <span class="s-ico">🔍</span>
      <input type="text" placeholder="Tìm kiếm spec..." value="${esc(state.search)}"
        oninput="state.search=this.value;render()">
    </div>`;

    if(found){
      h+=`<div style="font-size:13px;color:var(--text2);margin-bottom:16px">
        <b style="color:var(--text)">${found.length}</b> kết quả cho "<em>${esc(state.search.trim())}</em>"
      </div>${taskList(found,true)}`;
    } else {
      for(const yr of years){
        const tot=totalYr(yr);
        h+=`<div class="yr-section">
          <div class="yr-hdr">
            <span class="yr-label">${yr}</span>
            <span class="yr-total">${tot} spec${tot!==1?'s':''}</span>
          </div>
          <div class="qgrid">`;
        for(const q of QS){
          const n=(DATA[yr][q]||[]).length;
          h+=`<div class="qcard ${n===0?'empty':''}" onclick="selectQ('${yr}','${q}')">
            <div class="qcard-stripe"></div>
            <div class="qcard-label">${q}</div>
            <div class="qcard-n">${n}</div>
            <div class="qcard-sub">spec${n!==1?'s':''}</div>
          </div>`;
        }
        h+=`</div></div>`;
      }
    }
    el.innerHTML=h;

  } else {
    const items=(DATA[state.year]&&DATA[state.year][state.q])||[];
    const s=state.search.trim().toLowerCase();
    const found=s?items.filter(t=>t.name.toLowerCase().includes(s)):items;

    el.innerHTML=`
      <div class="bc">
        <span class="bc-a" onclick="goHome()">Home</span>
        <span class="bc-sep">/</span>
        <span class="bc-a" onclick="goHome()">${state.year}</span>
        <span class="bc-sep">/</span>
        <span style="color:var(--text3);font-weight:500">${state.q}</span>
      </div>
      <div class="pg-hdr">
        <div class="pg-title">${state.q} · ${state.year}</div>
        <div class="pg-sub">${items.length} spec document${items.length!==1?'s':''}</div>
      </div>
      <div class="search-wrap">
        <span class="s-ico">🔍</span>
        <input type="text" placeholder="Lọc trong ${state.q}..." value="${esc(state.search)}"
          oninput="state.search=this.value;render()">
      </div>
      ${found.length?taskList(found):`<div class="empty"><div class="empty-icon">📭</div><p>Không có kết quả</p></div>`}`;
  }
}

function taskList(ts,showQ=false){
  if(!ts.length) return `<div class="empty"><div class="empty-icon">📭</div><p>Chưa có spec nào</p></div>`;
  return `<div class="task-list">${ts.map(t=>`
    <div class="task" onclick="window.open('${t.file}','_self')">
      <div class="task-ic">${tIcon(t.tags||[])}</div>
      <div class="task-body">
        <div class="task-name">${t.name}</div>
        <div class="task-meta">
          ${showQ?`<span class="task-qb">${t.yr} · ${t.q}</span>`:''}
          <span class="task-path">${t.file}</span>
        </div>
        ${(t.tags||[]).length?`<div class="task-tags">${t.tags.map(g=>`<span class="tag ${g}">${g}</span>`).join('')}</div>`:''}
      </div>
      <div class="task-arrow">›</div>
    </div>`).join('')}</div>`;
}

function goHome(){state={year:null,q:null,search:''};render()}
function selectQ(yr,q){state={year:yr,q,search:''};render()}
function toggleYr(yr){
  collapsed[yr]=!collapsed[yr];
  const el=document.getElementById('qs-'+yr);
  if(el){
    el.style.maxHeight=collapsed[yr]?'0':'120px';
    el.classList.toggle('hidden',collapsed[yr]);
  }
  renderSB();
}

fetch('manifest.json')
  .then(r=>r.json())
  .then(raw=>{
    for(const yr of Object.keys(raw)){
      DATA[yr]={};
      for(const q of QS) DATA[yr][q]=[];
      const yrData=raw[yr];
      if(Array.isArray(yrData)){
        for(const item of yrData){
          const q=item.q||'Q1';
          if(!DATA[yr][q]) DATA[yr][q]=[];
          DATA[yr][q].push(item);
        }
      } else if(typeof yrData==='object'){
        for(const q of Object.keys(yrData)){
          DATA[yr][q]=Array.isArray(yrData[q])?yrData[q]:[];
        }
      }
    }
    render();
  })
  .catch(()=>{
    document.getElementById('main').innerHTML=`
      <div style="background:var(--red-bg);border:1px solid rgba(220,38,38,.15);border-radius:10px;padding:16px 20px;color:var(--red);font-size:13px;margin-top:10px;line-height:1.8">
        ⚠️ Không tải được <code style="font-family:'JetBrains Mono',monospace;font-size:12px;background:rgba(220,38,38,.08);padding:1px 6px;border-radius:4px">manifest.json</code><br>
        <span style="color:var(--text2)">Kiểm tra file có cùng thư mục với index.html.</span>
      </div>`;
  });
</script>
</body>
</html>
